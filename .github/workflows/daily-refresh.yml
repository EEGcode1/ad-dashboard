name: daily-refresh

on:
  schedule:
    # 06:00 UTC every day — SGI arrives ~05:30 BST, Kraken ~06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      BGAMING_URL: ${{ secrets.BGAMING_URL }}
      BGAMING_USER: ${{ secrets.BGAMING_USER }}
      BGAMING_PASS: ${{ secrets.BGAMING_PASS }}
      SUPERSET_URL: ${{ secrets.SUPERSET_URL }}
      SUPERSET_USER: ${{ secrets.SUPERSET_USER }}
      SUPERSET_PASS: ${{ secrets.SUPERSET_PASS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Build data.json
        id: build
        run: python -m build.build_data
        continue-on-error: true

      - name: Render site/index.html
        if: always()
        run: python -m build.render_html

      - name: Commit & push data + site
        if: always()
        run: |
          git config user.name  "ad-dashboard-bot"
          git config user.email "ad-dashboard-bot@users.noreply.github.com"
          git add data/data.json data/history site/index.html site/data.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "daily-refresh: $STAMP"
            git push
          fi

      - name: Upload site artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Fail workflow if LNW source was stale
        if: steps.build.outcome != 'success'
        run: |
          echo "::error::build_data failed — LNW source is stale. See logs."
          exit 1

  deploy:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
