<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atlantic Digital — Games Hub</title>
<style>
:root{
  --ink:#0b1120;--mute:#64748b;--line:#e2e8f0;
  --bg:#f1f5f9;--panel:#ffffff;
  --ad:#1d4ed8;--purple:#7c3aed;
  --good:#16a34a;--bad:#dc2626;
  --nav-bg:#0b1120;--nav-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);min-height:100vh;
  font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;height:var(--nav-h);
  background:var(--nav-bg);display:flex;align-items:center;
  padding:0 28px;gap:32px;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-brand{font-size:14px;font-weight:700;letter-spacing:.04em;color:#fff;
  text-decoration:none;white-space:nowrap;margin-right:8px}
.nav-brand span{opacity:.5;font-weight:400}
.nav-links{display:flex;gap:4px;flex:1}
.nav-link{display:inline-flex;align-items:center;gap:7px;padding:6px 13px;
  border-radius:8px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);
  text-decoration:none;transition:background .15s,color .15s}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.1);color:#fff}
.nav-link svg{opacity:.7;flex-shrink:0}
.nav-link.active svg{opacity:1}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#1a0533 0%,#4c1d95 100%);
  padding:44px 28px 36px;color:#fff;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 60% 40%,rgba(236,72,153,.15) 0%,transparent 65%);
  pointer-events:none}
.hero-inner{max-width:1100px;margin:0 auto;position:relative;z-index:1}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.5);margin-bottom:10px}
.hero-title{font-size:30px;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px}
.hero-sub{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:24px}
.hero-kpis{display:flex;gap:20px;flex-wrap:wrap}
.hkpi{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:12px;padding:14px 20px}
.hkpi .hk-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
  color:rgba(255,255,255,.5);margin-bottom:4px}
.hkpi .hk-val{font-size:24px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums}

/* ── CONTROLS ── */
.controls{max-width:1100px;margin:0 auto;padding:24px 28px 0;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:99px;border:1px solid var(--line);
  background:#fff;font-size:12px;font-weight:600;color:var(--mute);cursor:pointer;
  transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
.sort-select{padding:6px 12px;border-radius:8px;border:1px solid var(--line);
  background:#fff;font-size:12px;color:var(--ink);cursor:pointer;margin-left:auto}
.search-box{padding:6px 12px;border-radius:8px;border:1px solid var(--line);
  background:#fff;font-size:13px;color:var(--ink);width:200px;outline:none}
.search-box:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.results-count{font-size:12px;color:var(--mute);margin-left:4px}

/* ── GRID ── */
.main{max-width:1100px;margin:0 auto;padding:20px 28px 60px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;
  margin-top:20px}

/* ── GAME CARD ── */
.game-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;
  overflow:hidden;transition:box-shadow .15s,transform .15s;cursor:default}
.game-card:hover{box-shadow:0 10px 28px rgba(0,0,0,.1);transform:translateY(-3px)}
.game-thumb{position:relative;width:100%;padding-bottom:60%;background:#f1f5f9;overflow:hidden}
.game-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:transform .3s}
.game-card:hover .game-thumb img{transform:scale(1.04)}
.thumb-placeholder{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;background:linear-gradient(135deg,#e0e7ff,#ede9fe)}
.thumb-placeholder span{font-size:28px;opacity:.5}
.game-src-bar{position:absolute;top:10px;left:10px;display:flex;gap:4px}
.src-badge{display:inline-block;padding:2px 7px;border-radius:99px;
  font-size:10px;font-weight:700;letter-spacing:.04em}
.sb-lnw{background:rgba(29,78,216,.9);color:#fff}
.sb-oct{background:rgba(124,58,237,.9);color:#fff}
.sb-bg{background:rgba(190,24,93,.9);color:#fff}
.sb-cc{background:rgba(13,148,136,.9);color:#fff}
.sb-none{background:rgba(0,0,0,.5);color:#fff}
.live-dot{position:absolute;top:10px;right:10px;width:8px;height:8px;
  border-radius:99px;background:var(--good);box-shadow:0 0 0 2px rgba(22,163,74,.3)}

.game-body{padding:14px 16px 16px}
.game-name{font-size:14px;font-weight:700;letter-spacing:-0.01em;margin-bottom:10px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-stats{display:flex;flex-direction:column;gap:0}
.game-stat{display:flex;justify-content:space-between;font-size:12px;
  padding:5px 0;border-top:1px solid var(--line)}
.gs-k{color:var(--mute)}
.gs-v{font-weight:600;font-variant-numeric:tabular-nums}
.gs-v.ok{color:var(--good)}

/* no data placeholder */
.no-data-msg{text-align:center;padding:60px 20px;color:var(--mute);
  grid-column:1/-1}
.no-data-msg .nd-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.no-data-msg p{font-size:14px}

footer{text-align:center;font-size:12px;color:var(--mute);padding:32px 0 20px}

@media(max-width:600px){
  nav{padding:0 16px;gap:16px}
  .controls{padding:16px 16px 0}
  .main{padding:16px 16px 40px}
  .hero{padding:32px 16px 28px}
  .search-box{width:140px}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-brand" href="index.html">Atlantic Digital <span>/ Portal</span></a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Hub
    </a>
    <a class="nav-link" href="lnw.html">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      LNW Finance
    </a>
    <a class="nav-link active" href="games.html">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
      Games
    </a>
    <a class="nav-link" href="roadmap.html">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Roadmap
    </a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">Atlantic Digital · Games Hub</div>
    <div class="hero-title">Games Catalogue</div>
    <div class="hero-sub">All live titles across LNW, Octopus, BGaming and Crown Coins · MTD revenue per game</div>
    <div class="hero-kpis">
      <div class="hkpi"><div class="hk-label">Active (Yesterday)</div><div class="hk-val" id="hk-active">—</div></div>
      <div class="hkpi"><div class="hk-label">MTD Top GGR</div><div class="hk-val" id="hk-top">—</div></div>
      <div class="hkpi"><div class="hk-label">Data as of</div><div class="hk-val" id="hk-date" style="font-size:16px;padding-top:4px">—</div></div>
    </div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="filter-group" id="source-filters">
    <button class="filter-btn active" data-src="all">All Sources</button>
    <button class="filter-btn" data-src="lnw">LNW</button>
    <button class="filter-btn" data-src="octopus">Octopus</button>
    <button class="filter-btn" data-src="bgaming">BGaming</button>
    <button class="filter-btn" data-src="crowncoins">Crown Coins</button>
  </div>
  <input class="search-box" id="search" type="text" placeholder="Search game…">
  <select class="sort-select" id="sort-sel">
    <option value="mtd_ggr">Sort: MTD GGR ↓</option>
    <option value="day_ggr">Sort: Yesterday GGR ↓</option>
    <option value="name">Sort: Name A–Z</option>
  </select>
  <span class="results-count" id="results-count"></span>
</div>

<!-- GRID -->
<div class="main">
  <div class="games-grid" id="games-grid">
    <div class="no-data-msg">
      <div class="nd-icon">🎮</div>
      <p>Loading games…</p>
    </div>
  </div>
</div>

<footer id="footer">Atlantic Digital · Games Hub · ad-dashboard</footer>

<script>
const EUR = v => '€' + Number(v||0).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});
const DT  = new Intl.DateTimeFormat('en-GB',{dateStyle:'medium'});
const SRC_LABELS = {lnw:'LNW',octopus:'Octopus',bgaming:'BGaming',crowncoins:'Crown Coins'};
const SRC_CLS    = {lnw:'sb-lnw',octopus:'sb-oct',bgaming:'sb-bg',crowncoins:'sb-cc'};

// Game thumbnails from Google Drive — keyed by normalized game name.
// Format: drive file IDs. Add more as you get them from Stanislav.
// e.g. THUMB_MAP['book of ra'] = '1Abc...XYZ';
const THUMB_MAP = {};

function thumbUrl(fileId){
  return `https://drive.google.com/thumbnail?id=${fileId}&sz=w400`;
}

function normName(n){ return (n||'').toLowerCase().replace(/[^a-z0-9]/g,''); }

let ALL_DATA = null;
let activeSource = 'all';
let activeSearch = '';
let activeSort   = 'mtd_ggr';

async function load(){
  try{
    const res = await fetch('data.json?ts='+Date.now());
    ALL_DATA = await res.json();
    renderPage();
  }catch(e){
    document.getElementById('games-grid').innerHTML =
      `<div class="no-data-msg"><div class="nd-icon">⚠️</div><p>Failed to load: ${e.message}</p></div>`;
  }
}

function renderPage(){
  const d = ALL_DATA;
  const dayDate = d.day?.date||'—';
  document.getElementById('hk-date').textContent = dayDate;
  document.getElementById('footer').textContent =
    `Atlantic Digital · Games Hub · ad-dashboard · ${dayDate}`;

  // Build merged game map: key = source+name, values from mtd by_game + day rows
  const mtdMap = {};
  (d.mtd?.by_game||[]).forEach(g=>{
    const k = g.source+'::'+g.game;
    mtdMap[k] = g;
  });

  const dayMap = {};
  (d.day?.rows||[]).forEach(r=>{
    const k = r.source+'::'+r.game;
    if(!dayMap[k]) dayMap[k] = {ggr_eur:0, rev_share_eur:0, net_revenue_eur:0};
    dayMap[k].ggr_eur += r.ggr_eur||0;
    dayMap[k].rev_share_eur += r.rev_share_eur||0;
    dayMap[k].net_revenue_eur += r.net_revenue_eur||0;
  });

  // Merge all keys
  const allKeys = new Set([...Object.keys(mtdMap),...Object.keys(dayMap)]);
  const games = [];
  allKeys.forEach(k=>{
    const [src,name] = k.split('::');
    const mtd = mtdMap[k]||{};
    const day = dayMap[k]||{};
    games.push({
      source: src,
      game:   name,
      mtd_ggr:   mtd.ggr_eur||0,
      mtd_rev:   mtd.rev_share_eur||mtd.net_revenue_eur||0,
      day_ggr:   day.ggr_eur||0,
      day_rev:   day.rev_share_eur||day.net_revenue_eur||0,
      live_yesterday: !!dayMap[k],
    });
  });

  // KPIs
  const activeYesterday = games.filter(g=>g.live_yesterday).length;
  document.getElementById('hk-active').textContent = activeYesterday||'—';
  const topMtd = [...games].sort((a,b)=>b.mtd_ggr-a.mtd_ggr)[0];
  document.getElementById('hk-top').textContent = topMtd ? EUR(topMtd.mtd_ggr) : '—';

  renderGrid(games);
  bindControls(games);
}

function applyFilters(games){
  return games
    .filter(g=> activeSource==='all' || g.source===activeSource)
    .filter(g=> !activeSearch || g.game.toLowerCase().includes(activeSearch))
    .sort((a,b)=>{
      if(activeSort==='name')    return a.game.localeCompare(b.game);
      if(activeSort==='day_ggr') return b.day_ggr - a.day_ggr;
      return b.mtd_ggr - a.mtd_ggr;
    });
}

function renderGrid(games){
  const filtered = applyFilters(games);
  document.getElementById('results-count').textContent =
    `${filtered.length} game${filtered.length!==1?'s':''}`;

  if(filtered.length===0){
    document.getElementById('games-grid').innerHTML =
      `<div class="no-data-msg"><div class="nd-icon">🔍</div><p>No games match your filter.</p></div>`;
    return;
  }

  document.getElementById('games-grid').innerHTML = filtered.map(g=>{
    const fileId = THUMB_MAP[normName(g.game)];
    const thumb  = fileId
      ? `<img src="${thumbUrl(fileId)}" alt="${g.game}" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="thumb-placeholder"><span>🎰</span></div>`;
    const srcCls  = SRC_CLS[g.source]||'sb-none';
    const srcLbl  = SRC_LABELS[g.source]||g.source;
    const liveDot = g.live_yesterday ? `<div class="live-dot" title="Active yesterday"></div>` : '';
    const revLabel = g.source==='crowncoins' ? 'Net Revenue' : 'Rev Share (4%)';
    return `<div class="game-card">
      <div class="game-thumb">
        ${thumb}
        <div class="game-src-bar"><span class="src-badge ${srcCls}">${srcLbl}</span></div>
        ${liveDot}
      </div>
      <div class="game-body">
        <div class="game-name" title="${g.game}">${g.game}</div>
        <div class="game-stats">
          <div class="game-stat"><span class="gs-k">Yesterday GGR</span><span class="gs-v">${EUR(g.day_ggr)}</span></div>
          <div class="game-stat"><span class="gs-k">MTD GGR</span><span class="gs-v${g.mtd_ggr>0?' ok':''}">${EUR(g.mtd_ggr)}</span></div>
          <div class="game-stat"><span class="gs-k">${revLabel} MTD</span><span class="gs-v">${EUR(g.mtd_rev)}</span></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function bindControls(games){
  document.getElementById('source-filters').addEventListener('click',e=>{
    const btn = e.target.closest('[data-src]');
    if(!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeSource = btn.dataset.src;
    renderGrid(games);
  });
  document.getElementById('search').addEventListener('input',e=>{
    activeSearch = e.target.value.trim().toLowerCase();
    renderGrid(games);
  });
  document.getElementById('sort-sel').addEventListener('change',e=>{
    activeSort = e.target.value;
    renderGrid(games);
  });
}

load();
</script>
</body>
</html>
